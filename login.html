<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM — Sign In</title>
  <link rel="icon" type="image/png" href="/k.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .auth-container {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 2px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 440px;
      padding: 0;
      overflow: hidden;
    }

    .auth-logo {
      background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
      padding: 48px 40px 40px;
      text-align: center;
      border-bottom: 3px solid #c1121f;
    }

    .auth-logo-img {
      width: 72px;
      height: 72px;
      margin-bottom: 16px;
      opacity: 0.95;
    }

    .auth-logo-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .auth-logo-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .auth-form {
      padding: 40px 40px 32px;
    }

    .auth-field {
      margin-bottom: 24px;
    }

    .auth-field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6b6b6b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .auth-field-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      border: 1px solid #d4d4d4;
      border-radius: 2px;
      background: #ffffff;
      color: #1a1a1a;
      outline: none;
      transition: all 0.2s ease;
    }

    .auth-field-input::placeholder {
      color: #a3a3a3;
      font-weight: 300;
    }

    .auth-field-input:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.08);
    }

    .auth-submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      border: none;
      border-radius: 2px;
      background: #e63946;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .auth-submit-btn:hover {
      background: #d62828;
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.25);
    }

    .auth-submit-btn:active {
      transform: translateY(1px);
    }

    .auth-submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .auth-error {
      display: none;
      padding: 12px 14px;
      margin-top: 16px;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 2px;
      color: #c53030;
      font-size: 13px;
      font-weight: 500;
    }

    .auth-error.show {
      display: block;
    }

    .auth-footer {
      padding: 24px 40px;
      background: #fafafa;
      border-top: 1px solid #e5e5e5;
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .auth-link {
      font-size: 12px;
      color: #737373;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .auth-link:hover {
      color: #e63946;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .auth-container {
        max-width: 100%;
      }
      .auth-logo {
        padding: 36px 24px 32px;
      }
      .auth-form {
        padding: 32px 24px 24px;
      }
      .auth-footer {
        padding: 20px 24px;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="authOverlay">
    <div class="auth-container">
      <div class="auth-logo">
        <img src="/k.png" alt="PRISM" class="auth-logo-img" />
        <div class="auth-logo-title">PRISM</div>
        <div class="auth-logo-subtitle">APT Attribution Engine</div>
      </div>
      
      <div class="auth-form">
        <div class="auth-field">
          <label class="auth-field-label">EMAIL</label>
          <input 
            class="auth-field-input" 
            id="loginUser" 
            type="email" 
            placeholder="Enter your email address" 
            autocomplete="username"
            required
          />
        </div>
        
        <div class="auth-field">
          <label class="auth-field-label">PASSWORD</label>
          <input 
            class="auth-field-input" 
            id="loginPass" 
            type="password" 
            placeholder="Enter your password" 
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()"
            required
          />
        </div>
        
        <button class="auth-submit-btn" onclick="doLogin()" type="button" id="loginBtn">
          CONTINUE
        </button>
        
        <div class="auth-error" id="loginError">Invalid credentials</div>
      </div>
      
      <div class="auth-footer">
        <a href="#" class="auth-link">Privacy Notice</a>
        <a href="#" class="auth-link">Reset Password</a>
        <a href="#" class="auth-link">Help</a>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = window.location.origin;

    async function doLogin() {
      const email = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      const errorEl = document.getElementById('loginError');
      const loginBtn = document.getElementById('loginBtn');
      
      errorEl.classList.remove('show');
      
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loading-spinner"></span>SIGNING IN...';
      
      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({
            username: email,
            password: password
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Login failed');
        }

        window.location.href = '/dashboard.html';
        
      } catch (error) {
        errorEl.textContent = error.message || 'Invalid credentials. Please try again.';
        errorEl.classList.add('show');
        
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'CONTINUE';
      }
    }

    async function checkAuth() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/me`, {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (data.authenticated) {
          window.location.href = '/dashboard.html';
        }
      } catch (error) {
        console.log('Not authenticated');
      }
    }

    checkAuth();

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginUser').value = 'jk2302@gmail.com';
      document.getElementById('loginPass').value = 'Jk@9176101672';
    });
  </script>
</body>
</html>
